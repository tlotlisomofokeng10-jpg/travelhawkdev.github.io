    <style>
        /* Custom styles */
        body {

        }

        html.dark body {
            background: radial-gradient(ellipse at top, #1e293b, #020617);
        }

        .hero-bg {
            /* Use a dark gradient overlay on the main background for this page, or reuse the image if desired.
                For the download page, a clean look might be better, or we can reuse main BG */
            background-color: #0f172a;
            /* Fallback */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('../Gemini_Generated_Image_9z5lpj9z5lpj9z5l.png');
            background-size: cover;
            background-position: center 20%;
        }

        /* Language selector styles matching home/index.html */
        #language-selector {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-color: transparent;
            padding-left: 2.25rem;
            padding-right: 2rem;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            background-image:
                url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='1.5' stroke='%23475569' %3e%3cpath stroke-linecap='round' stroke-linejoin='round' d='M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418' /%3e%3c/svg%3e"),
                url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: left 0.5rem center, right 0.5rem center;
            background-repeat: no-repeat, no-repeat;
            background-size: 1.25em 1.25em, 1.5em 1.5em;
            border-radius: 0.5rem;
            border: 1px solid #cbd5e1;
            transition: width 0.3s ease-in-out, color 0.3s ease-in-out;
            color: transparent;
            width: 56px;
        }

        @media (min-width: 768px) {
            #language-selector {
                color: #475569;
                width: auto;
                padding-left: 1rem;
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
                background-position: right 0.5rem center;
            }
        }

        html.dark #language-selector {
            border-color: #475569;
            background-image:
                url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='1.5' stroke='%2394a3b8' %3e%3cpath stroke-linecap='round' stroke-linejoin='round' d='M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418' /%3e%3c/svg%3e"),
                url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        }

        @media (min-width: 768px) {
            html.dark #language-selector {
                color: #d1d5db;
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            }
        }

        .magnetic-button .magnetic-content {
            transition: transform 0.2s ease-out;
            display: inline-block;
        }
    </style>

    <script>
            // --- DEVICE DETECTION & REDIRECT ---
            (function () {
                var userAgent = navigator.userAgent || navigator.vendor || window.opera;

                // iOS Detection
                if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                    window.location.href = "https://apps.apple.com/za/app/crimehawk/id6584519575";
                }
                // Android Detection
                else if (/android/i.test(userAgent)) {
                    window.location.href = "https://play.google.com/store/apps/details?id=com.skeeptechnologies.crimehawk";
                }
            })();

        // Set theme on initial load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

<body class="text-slate-700 dark:text-slate-300 flex flex-col min-h-screen">

    <!-- Header & Navigation -->
    <header
        class="bg-white/80 dark:bg-slate-950/80 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 absolute w-full z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../" class="flex items-center space-x-2">
                <img src="../Untitled%20design%20(9).png" alt="TravelHawk Logo" class="w-10 h-10">
                <span class="text-2xl font-bold text-slate-800 dark:text-white">TravelHawk</span>
            </a>
            <div class="flex items-center space-x-2 md:space-x-4">
                <nav class="hidden md:flex items-center space-x-8">
                    <a href="../#home"
                        class="text-slate-600 dark:text-slate-300 hover:text-red-600 dark:hover:text-red-500 transition-colors"
                        data-i18n-key="navHome">Home</a>
                    <a href="../#features"
                        class="text-slate-600 dark:text-slate-300 hover:text-red-600 dark:hover:text-red-500 transition-colors"
                        data-i18n-key="navFeatures">Features</a>
                </nav>

                <!-- Language Selector -->
                <div class="relative">
                    <select id="language-selector" class="bg-transparent dark:bg-slate-900/80"></select>
                </div>

                <button id="theme-toggle"
                    class="text-slate-600 dark:text-slate-300 hover:text-red-600 dark:hover:text-red-500 transition-colors">
                    <i data-lucide="sun" class="w-6 h-6 hidden dark:inline"></i>
                    <i data-lucide="moon" class="w-6 h-6 dark:hidden"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center hero-bg relative">
        <div class="container mx-auto px-6 text-center text-white relative z-10 py-20">
            <div
                class="bg-black/30 backdrop-blur-md p-8 md:p-12 rounded-3xl inline-block border border-white/10 shadow-2xl">
                <img src="../Untitled%20design%20(9).png" alt="TravelHawk Logo"
                    class="w-24 h-24 mx-auto mb-6 drop-shadow-lg">
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4" data-i18n-key="downloadHeroTitle">Download
                    TravelHawk</h1>
                <p class="text-lg md:text-xl text-slate-200 mb-8 max-w-lg mx-auto" data-i18n-key="downloadHeroSubtitle">
                    Your personal safety companion for exploring South Africa.</p>

                <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
                    <a href="https://apps.apple.com/za/app/crimehawk/id6584519575" target="_blank"
                        rel="noopener noreferrer"
                        class="magnetic-button transition-transform hover:scale-105 duration-300">
                        <span class="magnetic-content">
                            <img src="../app-store-badge.svg" alt="Download on the App Store" class="h-16">
                        </span>
                    </a>
                    <a href="https://play.google.com/store/apps/details?id=com.skeeptechnologies.crimehawk"
                        target="_blank" rel="noopener noreferrer"
                        class="magnetic-button transition-transform hover:scale-105 duration-300">
                        <span class="magnetic-content">
                            <img src="../google-play-badge.png" alt="Get it on Google Play" class="h-[76px]">
                        </span>
                    </a>
                </div>
                <div class="mt-8">
                    <a href="../"
                        class="text-slate-300 hover:text-white underline underline-offset-4 text-sm font-medium transition-colors"
                        data-i18n-key="backToWebsite">Back to Website</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-8 border-t border-slate-800">
        <div class="container mx-auto px-6 text-center">
            <p class="text-sm" data-i18n-key="footerProductOf">A product of Skeep Technologies (Pty) Ltd.</p>
            <p class="text-sm mt-2" data-i18n-key="footerCopyright">&copy; 2025 TravelHawk. All rights reserved.</p>
        </div>
    </footer>


    <script>
        // Wait for the DOM to be fully loaded before running scripts
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // --- THEME TOGGLE LOGIC ---
            const themeToggleBtn = document.getElementById('theme-toggle');
            const htmlEl = document.documentElement;

            themeToggleBtn.addEventListener('click', () => {
                if (htmlEl.classList.contains('dark')) {
                    htmlEl.classList.remove('dark');
                    localStorage.theme = 'light';
                } else {
                    htmlEl.classList.add('dark');
                    localStorage.theme = 'dark';
                }
            });

            // --- MAGNETIC BUTTONS ---
            document.querySelectorAll('.magnetic-button').forEach(button => {
                const content = button.querySelector('.magnetic-content');
                button.addEventListener('mousemove', function (e) {
                    const { offsetX, offsetY, target } = e;
                    const { clientWidth, clientHeight } = target;
                    // Improved hit area logic to prevent jitter
                    const rect = target.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / clientWidth - 0.5) * 20;
                    const y = ((e.clientY - rect.top) / clientHeight - 0.5) * 20;

                    if (content) content.style.transform = `translate(${x}px, ${y}px)`;
                });
                button.addEventListener('mouseleave', function (e) {
                    if (content) content.style.transform = 'translate(0, 0)';
                });
            });

            // --- LOCALIZATION SCRIPT ---
            const translations = {
                'ar': 'Arabic', 'zh': 'Chinese', 'nl': 'Dutch', 'en': 'English', 'fr': 'French',
                'de': 'German', 'hi': 'Hindi', 'it': 'Italian', 'ja': 'Japanese', 'ko': 'Korean',
                'pt': 'Portuguese', 'ru': 'Russian', 'es': 'Spanish', 'sv': 'Swedish', 'th': 'Thai'
            };

            const languageSelector = document.getElementById('language-selector');

            // Populate language selector
            for (const langCode in translations) {
                const option = document.createElement('option');
                option.value = langCode;
                option.textContent = translations[langCode];
                languageSelector.appendChild(option);
            }

            // Basic language loading
            languageSelector.addEventListener('change', (e) => {
                // Here we would ideally load translations like the main page
                // For this simple landing page, we can perhaps just reload or keep it English default
                // as the download buttons are universal.
                // Reusing the fetch logic if possible or keeping it simple.
                loadLanguage(e.target.value);
            });

            async function loadLanguage(lang) {
                try {
                    const response = await fetch(`../translations/${lang}.json`);
                    if (!response.ok) return;
                    const data = await response.json();
                    document.querySelectorAll('[data-i18n-key]').forEach(el => {
                        const key = el.getAttribute('data-i18n-key');
                        if (data[key]) {
                            el.textContent = data[key];
                        }
                    });
                } catch (e) {
                    console.error("Failed to load language", e);
                }
            }

            // Attempt to auto-detect language from local storage or browser
            const savedLang = localStorage.getItem('i18nextLng') || navigator.language.split('-')[0];
            if (translations[savedLang]) {
                languageSelector.value = savedLang;
                loadLanguage(savedLang);
            } else {
                languageSelector.value = 'en'; // Default
            }

        });
    </script>
</body>

</html>
